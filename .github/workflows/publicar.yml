name: Publicar Instagram

on:
  # STANDBY — descomentar as linhas abaixo para reativar o cron automático
  # schedule:
  #   - cron: '0,10,20,30,40,50 * * * *'
  #   - cron: '5,15,25,35,45,55 * * * *'
  workflow_dispatch:                       # disparo manual continua disponível

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Instalar dependências Python
        run: |
          pip install --quiet \
            google-auth \
            google-auth-httplib2 \
            google-api-python-client \
            requests

      - name: Publicar posts agendados
        env:
          META_TOKEN:     ${{ secrets.META_TOKEN }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python publicar.py
