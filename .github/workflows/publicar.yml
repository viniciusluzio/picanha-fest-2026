name: Publicar Instagram

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # a cada 10 minutos (mais confiável que */5)
    - cron: '5,15,25,35,45,55 * * * *'   # offset de 5 min — garante cobertura a cada 5 min
  workflow_dispatch:                       # permite rodar manualmente

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Instalar dependências Python
        run: |
          pip install --quiet \
            google-auth \
            google-auth-httplib2 \
            google-api-python-client \
            requests

      - name: Publicar posts agendados
        env:
          META_TOKEN:     ${{ secrets.META_TOKEN }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python publicar.py
